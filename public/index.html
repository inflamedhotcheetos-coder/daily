<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
font-size: 16px;
    background: transparent;
    color: rgb(55, 53, 47);
    font-size: 14px;
    padding: 8px;
  }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .section-title {
    font-size: 1.25em;
    font-weight: 600;
    color: rgb(55, 53, 47);
    background: rgba(240, 239, 237, 1);
    padding: 6px 10px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .routine-section { margin-bottom: 20px; }
  table {
    width: auto;
    border-collapse: collapse;
    border: 1px solid rgba(55, 53, 47, 0.09);
    border-radius: 4px;
    overflow: hidden;
    font-size: 16px;
  }
  tr { border-bottom: 1px solid rgba(55, 53, 47, 0.09); }
  tr:last-child { border-bottom: none; }
  th {
    background: rgba(240, 239, 237, 1);
    font-weight: 500;
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
    width: 80px;
    font-size: 14px;
    color: rgb(55, 53, 47);
  }
  td {
    padding: 6px 10px;
    background: white;
    color: rgb(55, 53, 47);
    width: 1px;
  }
  .error { color: #e05252; padding: 16px 0; font-size: 16px; }
  .loading { color: rgba(55,53,47,0.4); padding: 16px 0; font-size: 16px; }
</style>
</head>
<body>
<div id="app"><p class="loading">Loading your routine…</p></div>
<script>
function getRichText(arr) {
  if (!arr || arr.length === 0) return '';
  return arr.map(t => t.plain_text || '').join('');
}

function renderTable(rows) {
  if (!rows || rows.length === 0) return '';
  let html = '<table><tbody>';
  for (const row of rows) {
    const cells = row.table_row?.cells || [];
    const time = getRichText(cells[0]);
    const activity = getRichText(cells[1]);
    html += `<tr><th>${time}</th><td>${activity}</td></tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function renderColumn(blocks) {
  let html = '';
  for (const block of blocks) {
    if (block.type === 'heading_2') {
      const text = getRichText(block.heading_2?.rich_text);
      html += `<div class="routine-section"><div class="section-title">${text}</div>`;
    }
    if (block.type === 'table' && block._rows) {
      html += renderTable(block._rows);
      html += '</div>';
    }
  }
  return html;
}

async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('/api/routine');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    let html = '<div class="columns">';
    for (const block of data.blocks) {
      if (block.type === 'column_list' && block._columns) {
        // Only render the first column (routines), skip second (to-dos/notes)
        html += `<div>${renderColumn(block._columns[0])}</div>`;
      }
    }
    html += '</div>';
    app.innerHTML = html;
  } catch (err) {
    app.innerHTML = `<p class="error">Could not load routine: ${err.message}</p>`;
  }
}

load();
</script>
</body>
</html>
